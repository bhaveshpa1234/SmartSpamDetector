<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Spam Detection System</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{

            font-family: 'Poppins', sans-serif;

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                135deg,
                #141e30,
                #243b55
            );

            overflow: hidden;
        }

        .container{

            width: 520px;

            background: rgba(255,255,255,0.08);

            backdrop-filter: blur(12px);

            padding: 40px;

            border-radius: 20px;

            border: 1px solid rgba(255,255,255,0.2);

            box-shadow:
                0 8px 32px rgba(0,0,0,0.3);

            text-align: center;

            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn{

            from{
                opacity: 0;
                transform: translateY(20px);
            }

            to{
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1{

            color: white;

            margin-bottom: 25px;

            font-size: 36px;

            font-weight: 700;
        }

        .subtitle{

            color: #dcdcdc;

            margin-bottom: 25px;

            font-size: 15px;
        }

        textarea{

            width: 100%;

            height: 170px;

            padding: 18px;

            border: none;

            outline: none;

            border-radius: 15px;

            resize: none;

            font-size: 16px;

            background: rgba(255,255,255,0.12);

            color: white;

            border: 2px solid transparent;

            transition: 0.3s;
        }

        textarea::placeholder{
            color: #d0d0d0;
        }

        textarea:focus{

            border-color: #00c6ff;

            background: rgba(255,255,255,0.18);
        }

        button{

            margin-top: 25px;

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 12px;

            background: linear-gradient(
                135deg,
                #00c6ff,
                #0072ff
            );

            color: white;

            font-size: 18px;

            font-weight: 600;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover{

            transform: scale(1.03);

            box-shadow:
                0 8px 20px rgba(0,114,255,0.5);
        }

        .result{

            margin-top: 30px;

            padding: 18px;

            border-radius: 15px;

            font-size: 24px;

            font-weight: 700;

            animation: pop 0.5s ease;
        }

        @keyframes pop{

            from{
                transform: scale(0.8);
                opacity: 0;
            }

            to{
                transform: scale(1);
                opacity: 1;
            }
        }

        .spam{

            background: rgba(255, 0, 0, 0.15);

            color: #ff4d4d;

            border: 1px solid rgba(255,0,0,0.4);
        }

        .ham{

            background: rgba(0,255,100,0.15);

            color: #00ff88;

            border: 1px solid rgba(0,255,100,0.4);
        }

        .footer{

            margin-top: 25px;

            color: #cfcfcf;

            font-size: 13px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>AI Spam Detection</h1>

        <p class="subtitle">
            Detect Spam or Ham Messages using Machine Learning
        </p>

        <form method="POST">

            {% csrf_token %}

            <textarea
                name="message"
                placeholder="Type your message here..."
                required
            ></textarea>

            <button type="submit">
                Analyze Message
            </button>

        </form>

        {% if prediction %}

            <div class="result {% if prediction == 'Spam Message' %}spam{% else %}ham{% endif %}">

                {{ prediction }}

            </div>

        {% endif %}

        <div class="footer">

            Powered by Django + Machine Learning

        </div>

    </div>

</body>

</html>
